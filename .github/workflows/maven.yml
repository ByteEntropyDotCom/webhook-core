name: Java CI/CD with Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webhook-core-jar
        path: target/*.jar

  docker-build:
    name: Docker Build
    needs: build-and-test
    runs-on: ubuntu-latest
    # Only run Docker build on pushes to main (merges)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      run: |
        docker build -t webhook-core:${{ github.sha }} .
        docker tag webhook-core:${{ github.sha }} webhook-core:latest
        
    - name: List Images
      run: docker images
