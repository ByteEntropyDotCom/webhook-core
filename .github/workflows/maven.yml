name: Java CI/CD with Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and Run Tests
      run: mvn clean package

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webhook-core-jar
        path: target/*.jar

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only build docker on actual merge to main

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: actions/setup-docker-action@v2

    - name: Build Docker Image
      run: |
        docker build -t webhook-core:${{ github.sha }} .
        docker tag webhook-core:${{ github.sha }} webhook-core:latest
