# Application Name
spring.application.name=webhook-core

# Virtual Threads (Spring Boot 3.2+)
spring.threads.virtual.enabled=true

# Datasource Configuration
spring.datasource.url=jdbc:h2:mem:webhookdb
spring.datasource.driverClassName=org.h2.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update

# Server Configuration
server.port=8085

# Webhook Retry Configuration
fintech.webhook.retry.max-attempts=5
fintech.webhook.retry.initial-backoff-seconds=10
fintech.webhook.retry.max-backoff-seconds=3600